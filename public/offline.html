<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #1e293b;
    padding: 24px;
  }
  .card {
    max-width: 360px;
    text-align: center;
  }
  .icon {
    font-size: 40px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 8px;
  }
  p {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 20px;
  }
  button {
    background: #002f3a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page isn't available offline yet. Your login and saved data are safe - just reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
